name: Verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      # Prisma needs *some* DATABASE_URL at generate/build time even though
      # SQLite is file-based and no DB is contacted in CI. The path is never
      # written to in this job.
      DATABASE_URL: "file:./data/umlautadaptarrex.db"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build (Next.js + Fastify bundle)
        run: pnpm build
